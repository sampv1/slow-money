name: Daily Price Evaluation

on:
  schedule:
    # Target: 3:30 PM GMT+7 (right after HOSE closes at 3:00 PM).
    # MUST run AFTER market close so today's closing price is available
    # from vnstock. Earliest safe time: 3:05 PM GMT+7 = 8:05 UTC.
    # Using uncommon minute mark :07 (instead of :30 which is heavily
    # contested on GitHub Actions free tier) to reduce queue delay.
    # Monday–Friday only. Note: if the script runs before vnstock has
    # today's data, symbols without today's price are simply skipped.
    - cron: "7 8 * * 1-5"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Verify secrets are set
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::SUPABASE_URL secret is not set in repo settings."
            echo "Go to Settings > Secrets and variables > Actions and add SUPABASE_URL."
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY secret is not set in repo settings."
            echo "Go to Settings > Secrets and variables > Actions and add SUPABASE_ANON_KEY."
            exit 1
          fi
          echo "Secrets OK: SUPABASE_URL length=${#SUPABASE_URL}, SUPABASE_ANON_KEY length=${#SUPABASE_ANON_KEY}"

      - name: Run price evaluation
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python update_prices.py
